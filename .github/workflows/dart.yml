# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Dart

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install Flutter (includes the matching Dart SDK) for Flutter commands.
      - uses: subosito/flutter-action@4efee115f1f8f612aafcb187ee16db202d7e4376
        with:
          channel: stable
          flutter-version: '2.10.5'

      - name: Install dependencies
        run: flutter pub get

      # Uncomment this step to verify the use of 'dart format' on each commit.
      # - name: Verify formatting
      #   run: dart format --output=none --set-exit-if-changed .

      # Consider passing '--fatal-infos' for slightly stricter analysis.
      - name: Analyze project source (non-blocking until migration)
        # TODO: Remove continue-on-error after null-safety migration is complete.
        run: flutter analyze
        continue-on-error: true

      - name: Run tests (legacy unsound null-safety)
        run: flutter test --no-sound-null-safety
